<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Printer AR</title>
  <style>
    :root {
      --accent: #00a0e3;
      --dark: #0b0f14;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--dark); color: #fff;
    }

    /* Câmera de fundo */
    #cam {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; background: #000;
    }
    /* leve escurecimento pra dar contraste ao conteúdo */
    #cam-scrim { position: fixed; inset: 0; z-index: 1; background: radial-gradient(120% 120% at 50% 40%, transparent 40%, rgba(0,0,0,.35)); pointer-events: none; }

    /* Palco 3D do conteúdo flutuante */
    #stage {
      position: fixed; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      perspective: 1000px; pointer-events: none;
    }
    #scene3d {
      position: relative; width: 320px; height: 480px;
      transform-style: preserve-3d;
      transition: transform .15s ease-out;
    }
    .layer {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity .5s ease, transform .6s cubic-bezier(.2,.8,.2,1);
      will-change: transform, opacity;
    }
    #scene3d.revealed .layer { opacity: 1; }

    /* Vídeo do produto */
    #pv-wrap {
      width: 260px; border-radius: 18px; overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08);
      transform: translate(-50%, -50%) translateY(20px) translateZ(40px);
    }
    #scene3d.revealed #pv-wrap { transform: translate(-50%, -50%) translateZ(40px); }
    #pv { display: block; width: 100%; height: auto; background: #111; }

    /* Mockups laterais */
    .mock {
      width: 118px; border-radius: 14px; overflow: hidden;
      box-shadow: 0 14px 34px rgba(0,0,0,.5);
      background: rgba(255,255,255,.06);
    }
    .mock img { display: block; width: 100%; height: auto; }
    #mock-left  { transform: translate(-50%, -50%) translate(-150px, 120px) rotateY(22deg) translateZ(-20px); }
    #mock-right { transform: translate(-50%, -50%) translate( 150px, 120px) rotateY(-22deg) translateZ(-20px); }
    #scene3d.revealed #mock-left  { transform: translate(-50%, -50%) translate(-118px, 120px) rotateY(22deg) translateZ(-10px); }
    #scene3d.revealed #mock-right { transform: translate(-50%, -50%) translate( 118px, 120px) rotateY(-22deg) translateZ(-10px); }

    /* Título */
    #title {
      top: 12%; font-size: 1.5rem; font-weight: 800; letter-spacing: .3px;
      text-align: center; width: 300px; text-shadow: 0 2px 12px rgba(0,0,0,.6);
      transform: translate(-50%, -50%) translateY(-16px) translateZ(60px);
    }
    #scene3d.revealed #title { transform: translate(-50%, -50%) translateZ(60px); }
    #title::after {
      content: ""; display: block; width: 54px; height: 3px; margin: 10px auto 0;
      background: var(--accent); border-radius: 2px;
    }

    /* Descrição */
    #desc {
      top: 84%; width: 290px; text-align: center; font-size: .95rem; line-height: 1.45;
      color: #dff1fb; text-shadow: 0 2px 10px rgba(0,0,0,.7);
      transform: translate(-50%, -50%) translateY(16px) translateZ(30px);
    }
    #scene3d.revealed #desc { transform: translate(-50%, -50%) translateZ(30px); }

    /* Start overlay */
    #start-overlay {
      position: fixed; inset: 0; z-index: 30;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      background: radial-gradient(120% 120% at 50% 0%, rgba(0,160,227,.20), transparent 60%), var(--dark);
    }
    #start-overlay h1 { font-size: 1.6rem; margin: 0 0 8px; }
    #start-overlay p  { font-size: 1rem; opacity: .8; margin: 0 0 32px; max-width: 320px; line-height: 1.5; }
    #start-btn {
      border: 0; border-radius: 999px; padding: 16px 40px; font-size: 1.05rem; font-weight: 700;
      color: #fff; background: var(--accent); box-shadow: 0 8px 24px rgba(0,160,227,.4); cursor: pointer;
    }
    #start-btn:active { transform: scale(.97); }

    /* Botão de som */
    #sound-btn {
      position: fixed; right: 16px; top: 16px; z-index: 20; display: none;
      width: 48px; height: 48px; border: 0; border-radius: 50%;
      background: rgba(0,0,0,.5); backdrop-filter: blur(6px); color: #fff; font-size: 1.2rem; cursor: pointer;
    }
    #hint {
      position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 20; display: none;
      padding: 10px 18px; border-radius: 999px; background: rgba(0,0,0,.5); backdrop-filter: blur(6px);
      font-size: .85rem; white-space: nowrap;
    }
  </style>
</head>
<body>

  <video id="cam" autoplay muted playsinline webkit-playsinline></video>
  <div id="cam-scrim"></div>

  <div id="stage">
    <div id="scene3d">
      <div class="layer" id="title">Produto</div>
      <div class="layer" id="pv-wrap">
        <video id="pv" loop muted playsinline webkit-playsinline></video>
      </div>
      <div class="layer mock" id="mock-left"><img id="m1" alt="" /></div>
      <div class="layer mock" id="mock-right"><img id="m2" alt="" /></div>
      <div class="layer" id="desc">Descrição do produto.</div>
    </div>
  </div>

  <button id="sound-btn" aria-label="Ativar som">🔇</button>
  <div id="hint">Incline o celular para explorar ✨</div>

  <div id="start-overlay">
    <h1 id="ov-title">Printer AR</h1>
    <p>Toque para abrir a câmera e ver o produto em realidade aumentada.</p>
    <button id="start-btn">Iniciar experiência</button>
  </div>

  <script>
    /* =======================================================================
       CATÁLOGO DE PRODUTOS  —  cada QR aponta para  ...?p=<chave>
       Troque os caminhos/textos pelos seus arquivos reais em /assets.
       Imagens/vídeos ausentes simplesmente não aparecem (degradam sem erro).
       ======================================================================= */
    const PRODUCTS = {
      'demo': {
        video: './assets/video.mp4',
        image1: './assets/mock1.png',
        image2: './assets/mock2.png',
        title: 'Produto Demo',
        desc: 'Experiência de teste — troque pelos dados reais do produto.'
      },
      'produto-a': {
        video: './assets/produto-a.mp4', image1: './assets/produto-a-1.png', image2: './assets/produto-a-2.png',
        title: 'Produto A', desc: 'Descrição do Produto A — material, aplicação, diferencial.'
      },
      'produto-b': {
        video: './assets/produto-b.mp4', image1: './assets/produto-b-1.png', image2: './assets/produto-b-2.png',
        title: 'Produto B', desc: 'Descrição do Produto B.'
      },
      'produto-c': {
        video: './assets/produto-c.mp4', image1: './assets/produto-c-1.png', image2: './assets/produto-c-2.png',
        title: 'Produto C', desc: 'Descrição do Produto C.'
      }
    };

    const cfg = PRODUCTS[new URLSearchParams(location.search).get('p')] || PRODUCTS['demo'];

    // preenche conteúdo
    const pv = document.getElementById('pv');
    // esconde o player se não houver vídeo válido (evita bloco preto)
    pv.addEventListener('error', () => { document.getElementById('pv-wrap').style.display = 'none'; });
    if (cfg.video) { pv.src = cfg.video; }
    else { document.getElementById('pv-wrap').style.display = 'none'; }
    setImg('m1', cfg.image1, 'mock-left');
    setImg('m2', cfg.image2, 'mock-right');
    document.getElementById('title').textContent = cfg.title;
    document.getElementById('desc').textContent  = cfg.desc;
    document.getElementById('ov-title').textContent = cfg.title;

    function setImg(imgId, src, wrapId) {
      const img = document.getElementById(imgId);
      img.onerror = () => { document.getElementById(wrapId).style.display = 'none'; };
      img.src = src;
    }

    const cam       = document.getElementById('cam');
    const scene3d   = document.getElementById('scene3d');
    const startOv   = document.getElementById('start-overlay');
    const startBtn  = document.getElementById('start-btn');
    const soundBtn  = document.getElementById('sound-btn');
    const hint      = document.getElementById('hint');

    startBtn.addEventListener('click', async () => {
      // 1) câmera traseira
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }, audio: false
        });
        cam.srcObject = stream;
        await cam.play();
      } catch (e) {
        alert('Não foi possível acessar a câmera. Verifique as permissões do navegador.');
        return;
      }

      // 2) permissão de orientação (iOS 13+)
      try {
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
          await DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', onTilt);
      } catch (e) { /* segue sem parallax */ }

      // 3) vídeo do produto
      try { await pv.play(); } catch (e) {}

      startOv.style.display = 'none';
      soundBtn.style.display = 'block';
      hint.style.display = 'block';
      setTimeout(() => hint.style.display = 'none', 4000);

      // revela com animação
      requestAnimationFrame(() => scene3d.classList.add('revealed'));
    });

    // Parallax por inclinação
    function onTilt(e) {
      const g = Math.max(-25, Math.min(25, e.gamma || 0)); // esq/dir
      const b = Math.max(-25, Math.min(25, (e.beta || 0) - 45)); // frente/trás
      scene3d.style.transform = `rotateY(${g * 0.6}deg) rotateX(${-b * 0.4}deg)`;
    }

    // Som
    soundBtn.addEventListener('click', () => {
      pv.muted = !pv.muted;
      soundBtn.textContent = pv.muted ? '🔇' : '🔊';
      if (!pv.muted) pv.play().catch(() => {});
    });
  </script>
</body>
</html>
