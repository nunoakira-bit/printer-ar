<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Printer AR</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root { --accent: #00a0e3; --dark: #0b0f14; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--dark); color: #fff; }

    #cam { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; background: #000; }

    /* Âncora: posicionada sobre o QR code detectado, segue posição/tamanho/rotação */
    #anchor {
      position: fixed; left: 0; top: 0; z-index: 2;
      width: 0; height: 0;
      transform: translate(-50%, -50%);
      opacity: 0; transition: opacity .25s ease;
      pointer-events: none;
    }
    #anchor.visible { opacity: 1; }
    .layer { position: absolute; left: 0; top: 0; transform: translate(-50%, -50%); }

    /* base de referência: composição desenhada para um QR de 220px; escala junto */
    #pv-wrap { width: 300px; border-radius: 14px; overflow: hidden;
      box-shadow: 0 16px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.10); transform: translate(-50%, -50%) translateY(-260px); }
    #pv { display: block; width: 100%; height: auto; background: #111; }

    .mock { width: 130px; border-radius: 12px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,.5); background: rgba(255,255,255,.06); }
    .mock img { display: block; width: 100%; height: auto; }
    #mock-left  { transform: translate(-50%, -50%) translate(-210px, -70px) rotate(-6deg); }
    #mock-right { transform: translate(-50%, -50%) translate( 210px, -70px) rotate(6deg); }

    #title { width: 360px; text-align: center; font-size: 30px; font-weight: 800; text-shadow: 0 2px 12px rgba(0,0,0,.7);
      transform: translate(-50%, -50%) translateY(-410px); }
    #title::after { content: ""; display: block; width: 60px; height: 3px; margin: 12px auto 0; background: var(--accent); border-radius: 2px; }

    #desc { width: 340px; text-align: center; font-size: 19px; line-height: 1.45; color: #dff1fb; text-shadow: 0 2px 10px rgba(0,0,0,.8);
      transform: translate(-50%, -50%) translateY(230px); }

    /* Start / UI */
    #start-overlay { position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px; background: radial-gradient(120% 120% at 50% 0%, rgba(0,160,227,.20), transparent 60%), var(--dark); }
    #start-overlay h1 { font-size: 1.6rem; margin: 0 0 8px; }
    #start-overlay p { font-size: 1rem; opacity: .8; margin: 0 0 32px; max-width: 320px; line-height: 1.5; }
    #start-btn { border: 0; border-radius: 999px; padding: 16px 40px; font-size: 1.05rem; font-weight: 700; color: #fff;
      background: var(--accent); box-shadow: 0 8px 24px rgba(0,160,227,.4); cursor: pointer; }
    #start-btn:active { transform: scale(.97); }

    #sound-btn { position: fixed; right: 16px; top: 16px; z-index: 20; display: none; width: 48px; height: 48px; border: 0;
      border-radius: 50%; background: rgba(0,0,0,.5); backdrop-filter: blur(6px); color: #fff; font-size: 1.2rem; cursor: pointer; }
    #hint { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 20; display: none; align-items: center; gap: 10px;
      padding: 12px 20px; border-radius: 999px; background: rgba(0,0,0,.55); backdrop-filter: blur(6px); font-size: .9rem; white-space: nowrap; }
    #hint .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  <video id="cam" autoplay muted playsinline webkit-playsinline></video>

  <!-- Âncora sobre o QR -->
  <div id="anchor">
    <div class="layer" id="title">Produto</div>
    <div class="layer" id="pv-wrap"><video id="pv" loop muted playsinline webkit-playsinline></video></div>
    <div class="layer mock" id="mock-left"><img id="m1" alt="" /></div>
    <div class="layer mock" id="mock-right"><img id="m2" alt="" /></div>
    <div class="layer" id="desc">Descrição do produto.</div>
  </div>

  <button id="sound-btn" aria-label="Ativar som">🔇</button>
  <div id="hint"><span class="dot"></span> Aponte a câmera para o QR code</div>

  <div id="start-overlay">
    <h1 id="ov-title">Printer AR</h1>
    <p>Toque para abrir a câmera, depois aponte para o QR code do produto.</p>
    <button id="start-btn">Iniciar experiência</button>
  </div>

  <script>
    /* ===== Catálogo (cada QR aponta para ?p=<chave>) ===== */
    const PRODUCTS = {
      'demo':      { video:'./assets/video.mp4',      image1:'./assets/mock1.png',      image2:'./assets/mock2.png',      title:'Produto Demo', desc:'Experiência de teste — troque pelos dados reais.' },
      'produto-a': { video:'./assets/produto-a.mp4',  image1:'./assets/produto-a-1.png', image2:'./assets/produto-a-2.png', title:'Produto A', desc:'Descrição do Produto A.' },
      'produto-b': { video:'./assets/produto-b.mp4',  image1:'./assets/produto-b-1.png', image2:'./assets/produto-b-2.png', title:'Produto B', desc:'Descrição do Produto B.' },
      'produto-c': { video:'./assets/produto-c.mp4',  image1:'./assets/produto-c-1.png', image2:'./assets/produto-c-2.png', title:'Produto C', desc:'Descrição do Produto C.' }
    };
    const cfg = PRODUCTS[new URLSearchParams(location.search).get('p')] || PRODUCTS['demo'];

    const REF_QR = 220; // tamanho de referência do QR (px) para o qual a composição foi desenhada

    const cam    = document.getElementById('cam');
    const anchor = document.getElementById('anchor');
    const pv     = document.getElementById('pv');
    const startOv= document.getElementById('start-overlay');
    const startBtn=document.getElementById('start-btn');
    const soundBtn=document.getElementById('sound-btn');
    const hint   = document.getElementById('hint');

    // conteúdo
    pv.addEventListener('error', () => document.getElementById('pv-wrap').style.display='none');
    if (cfg.video) pv.src = cfg.video; else document.getElementById('pv-wrap').style.display='none';
    setImg('m1', cfg.image1, 'mock-left');
    setImg('m2', cfg.image2, 'mock-right');
    document.getElementById('title').textContent = cfg.title;
    document.getElementById('desc').textContent  = cfg.desc;
    document.getElementById('ov-title').textContent = cfg.title;
    function setImg(id, src, wrap){ const i=document.getElementById(id); i.onerror=()=>document.getElementById(wrap).style.display='none'; i.src=src; }

    // canvas oculto para leitura de quadros
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let running = false, lastSeen = 0;
    // valores suavizados (low-pass) para evitar tremor
    let sm = { x:0, y:0, size:REF_QR, ang:0, has:false };

    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ ideal:'environment' } }, audio:false });
        cam.srcObject = stream; await cam.play();
      } catch(e){ alert('Não foi possível acessar a câmera. Verifique as permissões.'); return; }
      try { await pv.play(); } catch(e){}
      startOv.style.display='none'; soundBtn.style.display='block'; hint.style.display='flex';
      running = true; requestAnimationFrame(loop);
    });

    function loop(){
      if(!running) return;
      if(cam.readyState >= 2 && cam.videoWidth){
        const vw = cam.videoWidth, vh = cam.videoHeight;
        // amostra reduzida (~ 480px de largura) para performance
        const scaleDown = Math.min(1, 480 / vw);
        const cw = Math.round(vw*scaleDown), ch = Math.round(vh*scaleDown);
        if(canvas.width!==cw){ canvas.width=cw; canvas.height=ch; }
        ctx.drawImage(cam, 0, 0, cw, ch);
        const img = ctx.getImageData(0, 0, cw, ch);
        const code = jsQR(img.data, cw, ch, { inversionAttempts:'dontInvert' });

        if(code){
          lastSeen = performance.now();
          const L = code.location;
          // cantos em coords do canvas -> coords nativas do vídeo
          const inv = 1/scaleDown;
          const tl = { x:L.topLeftCorner.x*inv,    y:L.topLeftCorner.y*inv };
          const tr = { x:L.topRightCorner.x*inv,   y:L.topRightCorner.y*inv };
          const bl = { x:L.bottomLeftCorner.x*inv, y:L.bottomLeftCorner.y*inv };
          const cx = (tl.x+tr.x+bl.x+L.bottomRightCorner.x*inv)/4;
          const cy = (tl.y+tr.y+bl.y+L.bottomRightCorner.y*inv)/4;

          // mapeia coords do vídeo -> tela (object-fit: cover)
          const sw = window.innerWidth, sh = window.innerHeight;
          const cover = Math.max(sw/vw, sh/vh);
          const offX = (sw - vw*cover)/2, offY = (sh - vh*cover)/2;
          const S = p => ({ x: offX + p.x*cover, y: offY + p.y*cover });
          const c = S({x:cx,y:cy}), stl = S(tl), str = S(tr);
          const size = Math.hypot(str.x-stl.x, str.y-stl.y);           // lado do QR na tela
          const ang  = Math.atan2(str.y-stl.y, str.x-stl.x) * 180/Math.PI;

          // suavização
          const k = sm.has ? 0.35 : 1;
          sm.x = lerp(sm.x, c.x, k); sm.y = lerp(sm.y, c.y, k);
          sm.size = lerp(sm.size, size, k); sm.ang = lerpAngle(sm.ang, ang, k);
          sm.has = true;

          const f = sm.size / REF_QR;
          anchor.style.left = sm.x+'px'; anchor.style.top = sm.y+'px';
          anchor.style.transform = `translate(-50%,-50%) rotate(${sm.ang}deg) scale(${f})`;
          anchor.classList.add('visible');
        } else if(performance.now() - lastSeen > 400){
          anchor.classList.remove('visible'); sm.has=false;
        }
      }
      requestAnimationFrame(loop);
    }

    function lerp(a,b,t){ return a + (b-a)*t; }
    function lerpAngle(a,b,t){ let d=((b-a+540)%360)-180; return a + d*t; }

    soundBtn.addEventListener('click', () => {
      pv.muted = !pv.muted; soundBtn.textContent = pv.muted?'🔇':'🔊';
      if(!pv.muted) pv.play().catch(()=>{});
    });
  </script>
</body>
</html>
